<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitsubishi PLC Simulator</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Monaco Editor loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>PLC Instances</h2>
                <button id="btn-new-plc" class="btn primary-btn">+ New</button>
            </div>
            <ul id="plc-list" class="plc-list">
                <!-- Dynamically populated -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content glass-panel" id="main-view" style="display: none;">
            <!-- Header Status -->
            <header class="content-header">
                <div class="header-info">
                    <h1 id="header-name">PLC Name</h1>
                    <span id="header-status" class="status-badge stopped">Stopped</span>
                </div>
                <div class="header-actions">
                    <button id="btn-start" class="btn success-btn">Start</button>
                    <button id="btn-stop" class="btn danger-btn">Stop</button>
                    <button id="btn-save-cfg" class="btn outline-btn">Save Config</button>
                    <button id="btn-delete" class="btn outline-btn text-danger">Delete</button>
                </div>
            </header>

            <!-- Configuration -->
            <section class="config-section">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="cfg-name" readonly>
                </div>
                <div class="input-group">
                    <label>Port</label>
                    <input type="number" id="cfg-port">
                </div>
                <div class="input-group">
                    <label>Series</label>
                    <select id="cfg-series">
                        <option value="Q">Q Series (3E)</option>
                        <option value="L">L Series (3E)</option>
                        <option value="FX5U">FX5U Series (3E)</option>
                        <option value="FX">FX Series (3E)</option>
                        <option value="iQ-R">iQ-R Series (4E)</option>
                        <option value="iQ-F">iQ-F Series (4E)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Disconnect Interval (s)</label>
                    <input type="number" id="cfg-disc-int" value="0">
                </div>
                <div class="input-group">
                    <label>Disconnect Chance (%)</label>
                    <input type="number" id="cfg-disc-chan" value="0">
                </div>
                <div class="input-group">
                    <label>Script Interval (ms)</label>
                    <input type="number" id="cfg-script-int" value="1000">
                </div>
            </section>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-target="device-viewer">Device Viewer</button>
                <button class="tab-btn" data-target="script-editor">Python Script</button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content-container">
                <!-- Device Viewer -->
                <div id="device-viewer" class="tab-pane active">
                    <div class="viewer-toolbar">
                        <span>Memory Area: D0 - D65535</span>
                        <div class="pagination">
                            <button id="btn-prev-page" class="btn small-btn">&lt; Prev</button>
                            <span id="page-info">Page 1</span>
                            <button id="btn-next-page" class="btn small-btn">Next &gt;</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="device-table">
                            <thead>
                                <tr>
                                    <th>Address</th>
                                    <th>Dec (16-bit)</th>
                                    <th>Hex (16-bit)</th>
                                    <th>String (2-char)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Script Editor -->
                <div id="script-editor" class="tab-pane" style="display: none;">
                    <div class="editor-toolbar">
                        <span>Runs periodically based on Script Interval. Function must be `update(plc)`.</span>
                        <button id="btn-save-script" class="btn primary-btn small-btn">Save Script</button>
                    </div>
                    <div id="monaco-container"></div>
                </div>
            </div>
        </main>
        
        <!-- Empty State -->
        <main class="main-content empty-state glass-panel" id="empty-view">
            <h2>Select or create a PLC instance</h2>
        </main>

        <!-- Modal -->
        <div id="new-plc-modal" class="modal">
            <div class="modal-content glass-panel">
                <h3>New PLC Instance</h3>
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="new-plc-name">
                </div>
                <div class="input-group">
                    <label>Port</label>
                    <input type="number" id="new-plc-port" value="5000">
                </div>
                <div class="input-group">
                    <label>Series</label>
                    <select id="new-plc-series">
                        <option value="Q">Q Series (3E)</option>
                        <option value="L">L Series (3E)</option>
                        <option value="FX5U">FX5U Series (3E)</option>
                        <option value="FX">FX Series (3E)</option>
                        <option value="iQ-R">iQ-R Series (4E)</option>
                        <option value="iQ-F">iQ-F Series (4E)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button id="btn-cancel-new" class="btn outline-btn">Cancel</button>
                    <button id="btn-confirm-new" class="btn primary-btn">Create</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
